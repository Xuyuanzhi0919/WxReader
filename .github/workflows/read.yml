name: WeRead 自动阅读

on:
  # 每天北京时间 10:00 和 21:00 各跑一次（UTC+8 → UTC 02:00 / 13:00）
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 13 * * *"
  # 也支持手动触发
  workflow_dispatch:
    inputs:
      target_minutes:
        description: "目标阅读分钟数（覆盖默认值）"
        required: false
        default: ""

jobs:
  read:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 最长等 3 小时（120 分钟阅读 + 余量）

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto-read
        env:
          # ── 必填 ─────────────────────────────────────────────────────────
          # 在 Settings → Secrets → Actions 中添加 WXREAD_CURL_BASH
          # 值为：微信读书官网抓 /web/book/read 接口后右键 "Copy as cURL (bash)"
          WXREAD_CURL_BASH: ${{ secrets.WXREAD_CURL_BASH }}

          # ── 可选覆盖 ──────────────────────────────────────────────────────
          # Settings → Variables → Actions 中添加 TARGET_MINUTES（整数）
          TARGET_MINUTES: ${{ inputs.target_minutes || vars.TARGET_MINUTES }}

          # ── 推送（可选）──────────────────────────────────────────────────
          PUSH_METHOD:          ${{ secrets.PUSH_METHOD }}
          PUSHPLUS_TOKEN:       ${{ secrets.PUSHPLUS_TOKEN }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weread-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
