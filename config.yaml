# 微信读书自动阅读配置
# 优先级：环境变量 > config.yaml
# GitHub Action 用户：无需改此文件，直接配置 Secrets/Variables 即可

reading:
  # 每次运行目标阅读时长（分钟）
  target_minutes: 60

  # 两次请求之间的随机等待区间（秒）
  # 范围越大越像真人，建议不低于 25 秒（平台检测阈值）
  interval: "28-35"

  # 阅读连续性（0.0~1.0）
  # 越高越倾向于继续读当前书的下一章，模拟专注阅读
  continuity: 0.75

  # 从书架最多加载多少本书（避免初始化太慢）
  max_shelf_books: 8

  # 每本书最多取多少章节
  max_chapters: 15

# 推送通知（可选）
notify:
  # 推送方式：pushplus | telegram | （留空则不推送）
  method: ""

  # PushPlus（method = pushplus 时填写）
  # 获取地址：https://www.pushplus.plus/uc.html
  pushplus_token: ""

  # Telegram（method = telegram 时填写）
  telegram_bot_token: ""
  telegram_chat_id: ""
