# 微信读书自动阅读配置
# 优先级：环境变量 > config.yaml
# GitHub Action 用户：无需改此文件，直接配置 Secrets/Variables 即可

# ── 全局阅读参数（各用户的默认值，可被用户级配置覆盖）──────────────────────────
reading:
  target_minutes: 60        # 每次运行目标时长（分钟）
  interval: "28-35"         # 两次请求随机等待区间（秒），建议不低于 25s
  continuity: 0.75          # 阅读连续性（0~1），越高越倾向于继续读当前书
  max_shelf_books: 8        # 书架最多加载多少本书
  max_chapters: 15          # 每本书最多取多少章节

# ── 推送通知（可选，多用户共享一套推送）────────────────────────────────────────
notify:
  method: ""                # pushplus | telegram | （留空不推送）
  pushplus_token: ""
  telegram_bot_token: ""
  telegram_chat_id: ""

# ── 多用户配置（本地/服务器场景）────────────────────────────────────────────────
# 填写后脚本将依次为每位用户运行一次完整阅读流程。
# cookie 字段支持三种格式（任填其一）：
#   1. 纯 cookie 字符串：wr_skey=xxx; wr_vid=yyy; ...
#   2. curl bash 命令：curl 'https://...' -H '...'
#   3. Chrome 原始请求头（多行 key: value）
# 注：GitHub Action 场景无需填写此处，改用 workflow Matrix + Secrets（见 .github/workflows/read.yml）

